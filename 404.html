<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Page not found | Consultus Digital</title>
<script>
/* Self-healing redirect: if the URL contains a doubled project prefix
   (from a stale cached page's links), collapse it and forward. */
(function () {
  var p = window.location.pathname;
  var fixed = p.replace(/(\/consultus-site-prototypes)(?:\/consultus-site-prototypes)+/, '$1');
  if (fixed !== p) {
    window.location.replace(fixed + window.location.search + window.location.hash);
  }
})();
</script>
<style>
  body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #FAF8F3; color: #141414; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; }
  .box h1 { font-weight: 400; font-size: 64px; letter-spacing: -0.025em; margin: 0 0 12px; }
  .box p { color: #6A686B; margin: 0 0 28px; }
  .box a { display: inline-block; background: #141414; color: #FAF8F3; text-decoration: none; padding: 14px 26px; border-radius: 100px; font-size: 14px; transition: background 0.25s ease, color 0.25s ease; }
  .box a:hover { background: #FFEC00; color: #141414; }
</style>
</head>
<body>
  <div class="box">
    <h1>Page not found</h1>
    <p>This page doesn't exist on the preview site.</p>
    <a href="/">Back to the homepage</a>
  </div>
</body>
</html>
